<div class="contact-panel" id="contactPanel">
    <div class="contact-panel-backdrop" id="contactBackdrop"></div>
    <div class="contact-panel-body">
        <div class="contact-panel-header">
            <div>
                <h3>Get in Touch</h3>
                <p>We'd love to hear from you. Fill out the form and our team will get back to you as soon as possible.</p>
            </div>
            <button class="contact-panel-close" id="contactClose" aria-label="Close">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>

        <form class="contact-form" id="contactForm">
            <div class="form-row">
                <div class="form-group">
                    <label for="contact-name">Full Name</label>
                    <input type="text" id="contact-name" name="name" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label for="contact-email">Email Address</label>
                    <input type="email" id="contact-email" name="email" placeholder="john@company.com" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="contact-company">Company</label>
                    <input type="text" id="contact-company" name="company" placeholder="Your company (optional)">
                </div>
                <div class="form-group">
                    <label for="contact-website">Company Website</label>
                    <input type="url" id="contact-website" name="website" placeholder="https://company.com">
                </div>
            </div>

            <div class="form-group">
                <label for="contact-subject">Subject</label>
                <select id="contact-subject" name="subject" required>
                    <option value="" disabled selected>Select an inquiry</option>
                    <option value="general">General Inquiry</option>
                    <option value="developers">Developers Platform</option>
                    <option value="mcp">MarketMind MCP</option>
                    <option value="api">API Access & Integration</option>
                    <option value="pricing">Pricing & Billing</option>
                    <option value="enterprise">Enterprise & Partnerships</option>
                    <option value="support">Technical Support</option>
                    <option value="bug">Bug Report</option>
                    <option value="feature">Feature Request</option>
                    <option value="other">Other</option>
                </select>
            </div>

            <div class="form-group">
                <label for="contact-message">Message</label>
                <textarea id="contact-message" name="message" rows="5" maxlength="1000" placeholder="Describe your question, project, issue, or integration requirements..." required></textarea>
                <div class="form-char-count"><span id="charCount">0</span> / 1000</div>
            </div>

            <button type="submit" class="btn btn-primary contact-submit">
                Send Message
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>

            <div class="contact-divider">
                <span>Looking for a specific platform?</span>
            </div>

            <div class="contact-platform-links">
                <button type="button" class="btn btn-secondary contact-platform-btn" data-link="mcp">
                    Visit MarketMind MCP
                </button>
                <button type="button" class="btn btn-secondary contact-platform-btn" data-link="developers">
                    Visit Developers Platform
                </button>
            </div>
        </form>

        <div class="contact-success" id="contactSuccess">
            <div class="contact-success-icon">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
            </div>
            <h4>Message Sent!</h4>
            <p>Thanks for contacting MarketMind. Our team will review your message and respond as soon as possible.</p>
            <button class="btn btn-secondary contact-reset" id="contactReset">Send Another</button>
        </div>
    </div>
</div>
